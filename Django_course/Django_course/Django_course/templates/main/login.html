{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1>Вход в систему</h1>
<form method="post">
    {% csrf_token %}
    <p>
        <label>Имя пользователя:</label><br>
        <input type="text" name="username" required style="padding: 0.5rem; width: 100%; max-width: 300px;">
    </p>
    <p>
        <label>Пароль:</label><br>
        <input type="password" name="password" required style="padding: 0.5rem; width: 100%; max-width: 300px;">
    </p>
    <button type="submit" class="btn">Войти</button>
</form>
<p style="margin-top: 1rem;">Нет аккаунта? <a href="{% url 'register' %}" style="color:#8b0000;">Купите книгу, чтобы получить пароль для регистрации</a></p>
{% endblock %}
