{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h1>Регистрация</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>
<p style="margin-top: 1rem;">Уже есть аккаунт? <a href="{% url 'login' %}" style="color:#С0С0С0;">Войдите</a></p>
{% endblock %}
